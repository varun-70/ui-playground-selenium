version: "3.8"

services:
  selenium-hub:
    image: selenium/hub:4.27.0
    container_name: selenium-hub
    ports:
      - "4442:4442"   # event bus publish
      - "4443:4443"   # event bus subscribe
      - "4444:4444"   # Grid UI + WebDriver endpoint

  chrome-node:
    image: selenium/node-chrome:4.27.0
    container_name: selenium-node-chrome
    shm_size: 2gb
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=3
      - SE_NODE_OVERRIDE_MAX_SESSIONS=true
      - SE_SCREEN_WIDTH=1920
      - SE_SCREEN_HEIGHT=1080

  chrome-video:
    image: selenium/video:ffmpeg-8.0-20260222
    container_name: selenium-video-chrome
    depends_on:
      - chrome-node
    environment:
      - DISPLAY_CONTAINER_NAME=chrome-node   # must match the node container_name
      - SE_NODE_GRID_URL=http://selenium-hub:4444
      - SE_VIDEO_FILE_NAME=auto              # uses session ID as filename
    volumes:
      - ./videos:/videos

  firefox-node:
    image: selenium/node-firefox:4.27.0
    container_name: selenium-node-firefox
    shm_size: 2gb
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=3
      - SE_NODE_OVERRIDE_MAX_SESSIONS=true
      - SE_SCREEN_WIDTH=1920
      - SE_SCREEN_HEIGHT=1080

  firefox-video:
    image: selenium/video:ffmpeg-8.0-20260222
    container_name: selenium-video-firefox
    depends_on:
      - firefox-node
    environment:
      - DISPLAY_CONTAINER_NAME=selenium-node-firefox
      - SE_NODE_GRID_URL=http://selenium-hub:4444
      - SE_VIDEO_FILE_NAME=auto
    volumes:
      - ./videos:/videos

networks:
  default:
    driver: bridge